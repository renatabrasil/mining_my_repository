name: Django CI

on:
  push:
    branches: [ master ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      max-parallel: 4
      matrix:
        python-version: [ 3.9 ]
        # python-version: [3.7, 3.8, 3.9]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Cache dependency
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          python manage.py test --verbosity 2 --settings mining_my_repository.settings.test
      #      - name: Install coverage dependecy
      #        run: pip install coverage
      #      - name: Run Test With Coverage
      #        run: coverage run --branch --source=$GITHUB_WORKSPACE ./manage.py test contributions --noinput --parallel
      #      - name: Generate Coverage Report
      #        run: coverage xml -o test-coverage.xml
      - name: Generate coverage report
        run: |
          python -m pip install pytest-django pytest-cov
          pytest --cov-config=.coveragerc --cov=./ --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@f2274c2c340e0c81c8f7dc407b2a477b8935f171 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
          #          files: ./coverage1.xml,./coverage2.xml # optional
          flags: unittests # optional
          name: codecov-umbrella # optional
          fail_ci_if_error: false # optional (default = false)
          verbose: true # optional (default = false)
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
